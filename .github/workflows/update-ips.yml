name: Update VPS IP List

on:
  schedule:
    # 每小时整点运行一次（UTC 时间）
    - cron: '0 * * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许提交推送

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch API and extract IPs
        run: |
          curl -s https://vps789.com/public/sum/cfIpApi | \
          jq -r '
            [.data.CT, .data.CU, .data.CM, .data.AllAvg]
            | add
            | map(.ip)
            | unique
            | .[]
            | "\(.):443#VPS优选"
          ' > vps_ips.txt

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update vps_ips.txt [skip ci]"
          file_pattern: vps_ips.txt
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
